version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./data/db:/data/db

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social-media-app
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/social-media-app
      - PORT=5000
      - JWT_SECRET=123456
    depends_on:
      - mongodb
